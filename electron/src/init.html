<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎使用 Transactions</title>
  <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/ant-design-vue@4.2.6/dist/antd.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/ant-design-vue@4.2.6/dist/reset.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #app {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .welcome-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      padding: 40px 48px;
      text-align: center;
      height: 100%;
      overflow: hidden;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
    }
    .welcome-title {
      font-size: 28px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .welcome-subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }
    .features {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 40px;
    }
    .feature-item {
      text-align: center;
    }
    .feature-icon {
      width: 48px;
      height: 48px;
      background: #f0f5ff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 24px;
    }
    .feature-text {
      font-size: 13px;
      color: #444;
    }
    .workspace-section {
      margin-top: 32px;
    }
    .workspace-label {
      font-size: 14px;
      color: #333;
      margin-bottom: 12px;
      font-weight: 500;
    }
    .workspace-box {
      padding: 16px 24px;
      border: 1px dashed #d9d9d9;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .workspace-box:hover {
      border-color: #1890ff;
      background: #f0f5ff;
    }
    .workspace-box-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .workspace-box-text {
      font-size: 14px;
      color: #666;
    }
    .workspace-box:hover .workspace-box-text {
      color: #1890ff;
    }
    .workspace-path {
      font-size: 13px;
      color: #999;
      margin-top: 8px;
      text-align: center;
      word-break: break-all;
    }
    .intro-text {
      font-size: 13px;
      color: #888;
      margin-top: 24px;
      line-height: 1.6;
    }
    .window-control {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
    }
    .window-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
    }
    .window-btn.minimize { background: #febc2e; }
    .window-btn.maximize { background: #28c840; }
    .window-btn.close { background: #ff5f57; }
  </style>
</head>
<body>
  <div id="app">
    <div class="welcome-card">
      <svg class="logo" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="1024" height="1024" rx="200" fill="#f5f5f7"/>
        <g transform="translate(160, 160)">
          <rect x="32" y="100" width="640" height="112" rx="24" fill="#52c41a"/>
          <rect x="32" y="260" width="640" height="112" rx="24" fill="#f5222d"/>
          <rect x="32" y="420" width="640" height="112" rx="24" fill="#1677ff"/>
          <g transform="translate(-47.871643, 54.561707)">
            <polyline points="120,680 260,600 400,680 540,560 680,640" fill="none" stroke="#8e8e93" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="77.87" cy="681" r="18" fill="#8e8e93"/>
            <circle cx="217.87" cy="601" r="18" fill="#8e8e93"/>
            <circle cx="357.87" cy="681" r="18" fill="#8e8e93"/>
            <circle cx="497.87" cy="561" r="18" fill="#8e8e93"/>
            <circle cx="637.87" cy="641" r="18" fill="#8e8e93"/>
          </g>
        </g>
      </svg>
      <h1 class="welcome-title">欢迎使用 Transactions</h1>
      <p class="welcome-subtitle">简洁高效的个人财务管理工具</p>

      <div class="features">
        <div class="feature-item">
          <div class="feature-icon">📒</div>
          <div class="feature-text">多账本管理</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🏷️</div>
          <div class="feature-text">分类标签</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">📊</div>
          <div class="feature-text">数据分析</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🔒</div>
          <div class="feature-text">本地存储</div>
        </div>
      </div>

      <div class="workspace-section">
        <div class="workspace-label">请选择工作目录</div>
        <div class="workspace-box" @click="selectWorkspace">
          <div class="workspace-box-inner">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M2 4.5C2 3.67 2.67 3 3.5 3H7.5L9 5H16.5C17.33 5 18 5.67 18 6.5V14.5C18 15.33 17.33 16 16.5 16H3.5C2.67 16 2 15.33 2 14.5V4.5Z" stroke="#666" stroke-width="1.5" fill="none"/>
            </svg>
            <span class="workspace-box-text">点击选择工作目录</span>
          </div>
          <div v-if="workspacePath" class="workspace-path">{{ workspacePath }}</div>
        </div>
      </div>

      <p class="intro-text">
        工作目录用于存储您的账本数据<br>
        选择一个空目录即可创建新的工作空间
      </p>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        const workspacePath = ref('');

        const selectWorkspace = async () => {
          try {
            const result = await window.electronAPI.openDialog({
              properties: ['openDirectory'],
              title: '选择工作目录'
            });

            if (!result.canceled && result.filePaths && result.filePaths.length > 0) {
              workspacePath.value = result.filePaths[0];
              window.electronAPI.initWorkspace(result.filePaths[0]);
            }
          } catch (error) {
            console.error('选择目录失败:', error);
          }
        };

        return {
          workspacePath,
          selectWorkspace
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
