<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎使用 Transactions</title>
  <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/ant-design-vue@4.2.6/dist/antd.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/ant-design-vue@4.2.6/dist/reset.css">
  <style>
    :root {
      --billadm-color-primary: #2D5A27;
      --billadm-color-primary-light: #4A7A42;
      --billadm-color-secondary: #8B7355;
      --billadm-color-accent: #C9A227;
      --billadm-color-positive: #2D7D46;
      --billadm-color-negative: #C73E3A;
      --billadm-color-major-background: #FFFFFF;
      --billadm-color-major-warm: #FAFAF8;
      --billadm-color-minor-background: #F5F5F2;
      --billadm-color-divider: #E8E8E3;
      --billadm-color-text-major: #1A1A18;
      --billadm-color-text-secondary: #6B6B66;
      --billadm-color-window-border: #E5E5E0;
      --billadm-shadow-sm: 0 1px 2px rgba(45, 90, 39, 0.06);
      --billadm-shadow-md: 0 4px 12px rgba(45, 90, 39, 0.10);
      --billadm-shadow-lg: 0 8px 24px rgba(45, 90, 39, 0.15);
      --billadm-radius-md: 6px;
      --billadm-radius-lg: 10px;
      --billadm-transition-fast: 150ms ease;
      --billadm-color-hover-bg: rgba(45, 90, 39, 0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--billadm-color-major-warm);
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .welcome-card {
      background: var(--billadm-color-major-background);
      border: 1px solid var(--billadm-color-window-border);
      border-radius: var(--billadm-radius-lg);
      box-shadow: var(--billadm-shadow-lg);
      padding: 48px 56px;
      text-align: center;
      height: 100%;
      max-height: 600px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin-bottom: 20px;
    }

    .welcome-title {
      font-size: 28px;
      font-weight: 600;
      color: var(--billadm-color-text-major);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .welcome-subtitle {
      font-size: 14px;
      color: var(--billadm-color-text-secondary);
      margin-bottom: 32px;
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 36px;
    }

    .feature-item {
      text-align: center;
    }

    .feature-icon {
      width: 44px;
      height: 44px;
      background: var(--billadm-color-minor-background);
      border-radius: var(--billadm-radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      font-size: 20px;
    }

    .feature-text {
      font-size: 13px;
      color: var(--billadm-color-text-secondary);
    }

    .workspace-section {
      margin-top: 28px;
      width: 100%;
      max-width: 360px;
    }

    .workspace-label {
      font-size: 14px;
      color: var(--billadm-color-text-major);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .workspace-box {
      padding: 16px 24px;
      border: 1px dashed var(--billadm-color-window-border);
      border-radius: var(--billadm-radius-md);
      cursor: pointer;
      transition: all var(--billadm-transition-fast);
      background: var(--billadm-color-major-background);
    }

    .workspace-box:hover {
      border-color: var(--billadm-color-primary);
      background: var(--billadm-color-hover-bg);
    }

    .workspace-box-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .workspace-box-text {
      font-size: 14px;
      color: var(--billadm-color-text-secondary);
      transition: color var(--billadm-transition-fast);
    }

    .workspace-box:hover .workspace-box-text {
      color: var(--billadm-color-primary);
    }

    .workspace-path {
      font-size: 13px;
      color: var(--billadm-color-text-secondary);
      margin-top: 10px;
      text-align: center;
      word-break: break-all;
      opacity: 0.8;
    }

    .intro-text {
      font-size: 13px;
      color: var(--billadm-color-text-secondary);
      margin-top: 24px;
      line-height: 1.6;
      opacity: 0.8;
    }

    .window-control {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
    }

    .window-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .window-btn:hover {
      transform: scale(1.1);
    }

    .window-btn.minimize { background: #febc2e; }
    .window-btn.maximize { background: #28c840; }
    .window-btn.close { background: #ff5f57; }
  </style>
</head>
<body>
  <div id="app">
    <div class="welcome-card">
      <svg class="logo" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="1024" height="1024" rx="200" fill="#F5F5F2"/>
        <g transform="translate(160, 160)">
          <rect x="32" y="100" width="640" height="112" rx="20" fill="#2D5A27"/>
          <rect x="32" y="260" width="640" height="112" rx="20" fill="#C73E3A"/>
          <rect x="32" y="420" width="640" height="112" rx="20" fill="#5A7FAA"/>
          <g transform="translate(-47.871643, 54.561707)">
            <polyline points="120,680 260,600 400,680 540,560 680,640" fill="none" stroke="#8B7355" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="77.87" cy="681" r="16" fill="#8B7355"/>
            <circle cx="217.87" cy="601" r="16" fill="#8B7355"/>
            <circle cx="357.87" cy="681" r="16" fill="#8B7355"/>
            <circle cx="497.87" cy="561" r="16" fill="#8B7355"/>
            <circle cx="637.87" cy="641" r="16" fill="#8B7355"/>
          </g>
        </g>
      </svg>
      <h1 class="welcome-title">欢迎使用 Transactions</h1>
      <p class="welcome-subtitle">简洁高效的个人财务管理工具</p>

      <div class="features">
        <div class="feature-item">
          <div class="feature-icon">📒</div>
          <div class="feature-text">多账本管理</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🏷️</div>
          <div class="feature-text">分类标签</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">📊</div>
          <div class="feature-text">数据分析</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🔒</div>
          <div class="feature-text">本地存储</div>
        </div>
      </div>

      <div class="workspace-section">
        <div class="workspace-label">请选择工作目录</div>
        <div class="workspace-box" @click="selectWorkspace">
          <div class="workspace-box-inner">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M2 4.5C2 3.67 2.67 3 3.5 3H7.5L9 5H16.5C17.33 5 18 5.67 18 6.5V14.5C18 15.33 17.33 16 16.5 16H3.5C2.67 16 2 15.33 2 14.5V4.5Z" stroke="#6B6B66" stroke-width="1.5" fill="none"/>
            </svg>
            <span class="workspace-box-text">点击选择工作目录</span>
          </div>
          <div v-if="workspacePath" class="workspace-path">{{ workspacePath }}</div>
        </div>
      </div>

      <p class="intro-text">
        工作目录用于存储您的账本数据<br>
        选择一个空目录即可创建新的工作空间
      </p>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        const workspacePath = ref('');

        const selectWorkspace = async () => {
          try {
            const result = await window.electronAPI.openDialog({
              properties: ['openDirectory'],
              title: '选择工作目录'
            });

            if (!result.canceled && result.filePaths && result.filePaths.length > 0) {
              workspacePath.value = result.filePaths[0];
              window.electronAPI.initWorkspace(result.filePaths[0]);
            }
          } catch (error) {
            console.error('选择目录失败:', error);
          }
        };

        return {
          workspacePath,
          selectWorkspace
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
