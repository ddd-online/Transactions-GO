<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎使用 Transactions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
  <style>
    :root {
      --billadm-color-primary: #2D5A27;
      --billadm-color-primary-light: #4A7A42;
      --billadm-color-secondary: #8B7355;
      --billadm-color-accent: #C9A227;
      --billadm-color-positive: #2D7D46;
      --billadm-color-negative: #C73E3A;
      --billadm-color-major-background: #FFFFFF;
      --billadm-color-major-warm: #FAFAF8;
      --billadm-color-minor-background: #F5F5F2;
      --billadm-color-divider: #E8E8E3;
      --billadm-color-text-major: #1A1A18;
      --billadm-color-text-secondary: #6B6B66;
      --billadm-color-window-border: #E5E5E0;
      --billadm-shadow-sm: 0 1px 2px rgba(45, 90, 39, 0.06);
      --billadm-shadow-md: 0 4px 12px rgba(45, 90, 39, 0.10);
      --billadm-shadow-lg: 0 8px 24px rgba(45, 90, 39, 0.15);
      --billadm-shadow-xl: 0 16px 48px rgba(45, 90, 39, 0.20);
      --billadm-radius-md: 6px;
      --billadm-radius-lg: 10px;
      --billadm-radius-xl: 16px;
      --billadm-transition-fast: 150ms ease;
      --billadm-transition-normal: 250ms ease;
      --billadm-color-hover-bg: rgba(45, 90, 39, 0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--billadm-color-major-warm);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(45, 90, 39, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(139, 115, 85, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.015;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .welcome-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Left panel - branding */
    .branding-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 72px;
      position: relative;
    }

    .branding-content {
      display: flex;
      flex-direction: column;
      max-width: 400px;
    }

    /* Right panel - action with icon */
    .action-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px 64px;
      background: var(--billadm-color-major-background);
      border-left: 1px solid var(--billadm-color-divider);
      position: relative;
      text-align: center;
    }

    .action-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse 100% 80% at 50% 0%, rgba(45, 90, 39, 0.03) 0%, transparent 60%);
      pointer-events: none;
    }


    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand-title {
      font-size: 32px;
      font-weight: 600;
      color: var(--billadm-color-text-major);
      margin-bottom: 12px;
      letter-spacing: -1px;
      animation: floatIn 0.8s ease 0.3s both;
    }

    .brand-tagline {
      font-size: 15px;
      color: var(--billadm-color-text-secondary);
      line-height: 1.7;
      max-width: 300px;
      animation: floatIn 0.8s ease 0.4s both;
    }

    .accent-bars {
      display: flex;
      gap: 8px;
      margin-top: 48px;
      animation: floatIn 0.8s ease 0.5s both;
    }

    .accent-bar {
      width: 48px;
      height: 4px;
      border-radius: 2px;
    }

    .accent-bar:nth-child(1) {
      background: var(--billadm-color-primary);
    }

    .accent-bar:nth-child(2) {
      background: var(--billadm-color-negative);
    }

    .accent-bar:nth-child(3) {
      background: var(--billadm-color-accent);
    }

    .accent-bar:nth-child(4) {
      background: var(--billadm-color-secondary);
    }

    /* Primary CTA Button - "开始使用" */
    .cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 36px;
      background: var(--billadm-color-primary);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: var(--billadm-radius-lg);
      cursor: pointer;
      transition:
        transform var(--billadm-transition-normal),
        box-shadow var(--billadm-transition-normal),
        background var(--billadm-transition-fast);
      box-shadow: var(--billadm-shadow-md);
      opacity: 0;
      animation: fadeIn 0.6s ease 0.6s forwards;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .cta-button:hover {
      background: var(--billadm-color-primary-light);
      transform: translateY(-2px);
      box-shadow: var(--billadm-shadow-lg), 0 0 24px rgba(45, 90, 39, 0.18);
    }

    .cta-button:active {
      transform: translateY(0px);
    }

    .cta-button svg {
      transition: transform var(--billadm-transition-normal);
      flex-shrink: 0;
    }

    .cta-button:hover svg {
      transform: translateX(4px);
    }

    /* Workspace path display */
    .workspace-path-box {
      margin-top: 20px;
      padding: 12px 18px;
      background: var(--billadm-color-minor-background);
      border-radius: var(--billadm-radius-md);
      font-size: 12px;
      color: var(--billadm-color-text-secondary);
      font-family: 'SF Mono', 'Consolas', monospace;
      word-break: break-all;
      max-width: 300px;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.8s forwards;
      border-left: 3px solid var(--billadm-color-primary);
    }

    /* Window controls */
    .window-control {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .window-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      opacity: 0.9;
    }

    .window-btn:hover {
      transform: scale(1.15);
      opacity: 1;
    }

    .window-btn.minimize {
      background: #febc2e;
    }

    .window-btn.maximize {
      background: #28c840;
    }

    .window-btn.close {
      background: #ff5f57;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .welcome-container {
        grid-template-columns: 1fr;
      }

      .branding-panel {
        padding: 60px 40px 40px;
        justify-content: center;
        user-select: none;
        -webkit-app-region: drag;
        pointer-events: auto;
      }

      .branding-content {
        align-items: center;
        text-align: center;
      }

      .brand-tagline {
        text-align: center;
      }

      .action-panel {
        border-left: none;
        border-top: 1px solid var(--billadm-color-divider);
        padding: 48px 32px;
      }

      .accent-bars {
        margin-top: 40px;
      }

      .cta-button {
        padding: 12px 28px;
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      .branding-panel {
        padding: 40px 24px 24px;
      }

      .brand-title {
        font-size: 26px;
      }

      .action-panel {
        padding: 36px 24px;
      }

      .workspace-path-box {
        max-width: 260px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="welcome-container">
      <!-- Left: Branding -->
      <div class="branding-panel">
        <div class="branding-content">
          <h1 class="brand-title">Transactions</h1>
          <p class="brand-tagline">
            简洁高效的个人财务管理工具<br>
            多账本 · 分类标签 · 数据分析
          </p>

          <div class="accent-bars">
            <div class="accent-bar"></div>
            <div class="accent-bar"></div>
            <div class="accent-bar"></div>
            <div class="accent-bar"></div>
          </div>
        </div>
      </div>

      <!-- Right: Action -->
      <div class="action-panel">
        <button class="cta-button" @click="selectWorkspace">
          开始使用
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M7.5 5L12.5 10L7.5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>

        <div v-if="workspacePath" class="workspace-path-box">
          {{ workspacePath }}
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        const workspacePath = ref('');

        const selectWorkspace = async () => {
          try {
            const result = await window.electronAPI.openDialog({
              properties: ['openDirectory'],
              title: '选择工作目录'
            });

            if (!result.canceled && result.filePaths && result.filePaths.length > 0) {
              workspacePath.value = result.filePaths[0];
              window.electronAPI.initWorkspace(result.filePaths[0]);
            }
          } catch (error) {
            console.error('选择目录失败:', error);
          }
        };

        return {
          workspacePath,
          selectWorkspace
        };
      }
    }).mount('#app');
  </script>
</body>

</html>
