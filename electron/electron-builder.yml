appId: com.github.Transactions
productName: Transactions
asar: false
directories:
  output: out
  buildResources: assets
files:
  - src/**
  - node_modules/**
  - package.json
  - dist/**
  - Billadm-Kernel.exe
win:
  icon: "Transactions.ico"
  requestedExecutionLevel: "asInvoker"
  target: nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  deleteAppDataOnUninstall: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Transactions"
  license: "../LICENSE"
  #  include: "nsis/installer.nsh"
  warningsAsErrors: false
  installerSidebar: "nsis/installerSidebar.bmp"
  uninstallerSidebar: "nsis/uninstallerSidebar.bmp"
  installerIcon: "Transactions.ico"
  uninstallerIcon: "Transactions.ico"
